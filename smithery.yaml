name: self-healing-infrastructure-mcp
description: AI-powered self healing infrastructure MCP server for agents. Supports
  node health check, cluster health check, restart service. By MEOK AI Labs.
version: 1.0.0
tools:
- name: node_health_check
  description: Check health of individual infrastructure nodes (CPU, memory, disk,
    GPU).
  parameters:
  - name: node_name
    type: string
    required: true
- name: cluster_health_check
  description: Check health of all 9 nodes in the cluster.
  parameters: []
- name: restart_service
  description: Restart a failed service with automatic retry logic.
  parameters:
  - name: service_name
    type: string
    required: true
  - name: node_name
    type: string
    required: true
  - name: max_retries
    type: number
    required: false
- name: cost_report
  description: Generate infrastructure cost report with breakdown.
  parameters:
  - name: nodes
    type: array
    required: true
  - name: cost_per_hour
    type: number
    required: true
- name: auto_remediate
  description: Automatically remediate common infrastructure issues.
  parameters:
  - name: issue
    type: string
    required: true
  - name: node_name
    type: string
    required: true
- name: gpu_orchestration
  description: Orchestrate GPU allocation across the 9-node cluster.
  parameters:
  - name: task
    type: string
    required: true
  - name: gpu_required
    type: number
    required: false
  - name: priority
    type: string
    required: false
- name: failover_decision
  description: Determine failover action for a failed node.
  parameters:
  - name: failed_node
    type: string
    required: true
