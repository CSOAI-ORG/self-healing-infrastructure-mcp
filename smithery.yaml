name: self-healing-infrastructure-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: node_health_check
  description: Check health of infrastructure nodes including CPU, memory, disk, and
    services.
  parameters:
  - name: node_name
    type: string
    required: true
- name: restart_service
  description: Restart a failed service with automatic rollback on repeated failures.
  parameters:
  - name: service_name
    type: string
    required: true
  - name: node_name
    type: string
    required: true
- name: cost_report
  description: Generate infrastructure cost report with breakdown by service, region,
    and resource.
  parameters:
  - name: nodes
    type: array
    required: true
  - name: cost_per_hour
    type: number
    required: true
- name: auto_remediate
  description: Automatically remediate common infrastructure issues using predefined
    playbooks.
  parameters:
  - name: issue
    type: string
    required: true
  - name: node_name
    type: string
    required: true
